databases:
  # ── Postgres ── Free tier ──
  - name: dreamerz-db
    plan: free
    region: oregon
    databaseName: dreamerz
    user: dreamerz

services:
  # ── Backend (FastAPI) ── Free tier ──
  - type: web
    name: dreamerz-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      # Auto-injected internal Postgres connection string. config.py
      # rewrites `postgres://` to `postgresql+asyncpg://` on import.
      - key: DATABASE_URL
        fromDatabase:
          name: dreamerz-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard (Claude API key)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CORS_ORIGINS
        sync: false  # Comma-separated origins, e.g.
                     # https://dreamerz.com,https://www.dreamerz.com
                     # (the bare onrender.com URLs can stay alongside during the cutover).
      - key: ADMIN_EMAILS
        sync: false  # Comma-separated emails granted admin access
      - key: RESEND_API_KEY
        sync: false  # API key from resend.com — required for password reset / welcome emails
      - key: SENDER_EMAIL
        value: onboarding@resend.dev  # Sandbox sender; replace with verified domain for production
      - key: FRONTEND_URL
        sync: false  # Canonical public URL (e.g. https://dreamerz.com).
                     # Used by services/email_service.py to build the absolute
                     # links in welcome / password-reset emails.
      - key: CLOUDINARY_URL
        sync: false  # Full URL: cloudinary://<api_key>:<api_secret>@<cloud_name>
                     # Find it in Cloudinary dashboard → Programmable Media → API Keys.
                     # Without it: media uploads silently fall back to local disk
                     # (which doesn't survive a Render redeploy on the free tier).
      - key: PYTHON_VERSION
        value: "3.11.6"
      # Courses are now authored directly in the DB (admin panel or
      # content_drafts/ SQL scripts). The legacy seed_data() loop in
      # backend/database.py used to re-create the demo courses (Claude,
      # Gemini, ChatGPT, etc.) from data/curriculum.json on every
      # backend startup — which silently brought deleted courses back
      # to life after each deploy. Keep this set to "false" in
      # production. Set to "true" only on a fresh local dev environment
      # that wants the demo content.
      - key: SEED_COURSES_FROM_CURRICULUM
        value: "false"

  # ── Frontend (React static) ── Free, served via Render's global CDN ──
  - type: web
    runtime: static
    name: dreamerz-frontend
    rootDir: frontend
    buildCommand: CI=false yarn install --no-frozen-lockfile && yarn build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false  # Backend URL the SPA calls (e.g. https://api.dreamerz.com
                     # if you've pointed an `api` subdomain at the backend
                     # service, otherwise https://dreamerz-backend.onrender.com).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      # Hashed CRA build assets are content-addressed — cache them forever.
      - path: /static/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      # The app shell and the service worker itself must never be cached, or
      # a deploy won't be picked up until the browser cache expires (the
      # "needs multiple manual refreshes after deploy" bug).
      - path: /index.html
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: /service-worker.js
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: /manifest.json
        name: Cache-Control
        value: "no-cache"
