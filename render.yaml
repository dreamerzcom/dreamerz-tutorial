services:
  # ── Backend (FastAPI) ── Free tier ──
  - type: web
    name: dreamerz-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false  # Set manually in Render dashboard (Atlas connection string)
      - key: DB_NAME
        value: dreamerz_beta
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard (Claude API key)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CORS_ORIGINS
        sync: false  # Set after frontend deploys (e.g. https://dreamerz-frontend.onrender.com)
      - key: PYTHON_VERSION
        value: "3.11.6"

  # ── Frontend (React static) ── Free tier ──
  - type: static
    name: dreamerz-frontend
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: CI=false yarn install --no-frozen-lockfile && yarn build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false  # Set to backend URL (e.g. https://dreamerz-backend.onrender.com)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
