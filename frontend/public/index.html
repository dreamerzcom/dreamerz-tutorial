<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="DreamerZ_Lite — AI & Conversational English learning for learners 11 years and above" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="DreamerZ" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <title>DreamerZ_Lite | AI & Conversational English Learning</title>
        <!--
            Apply the persisted theme BEFORE React mounts and before the
            stylesheet renders to <body>. Without this, dark-mode users
            see a white flash on every page load and after every logout.
            Key string must stay in sync with THEME_STORAGE_KEY in
            src/config/constants.js.
        -->
        <script>
            (function () {
                try {
                    var t = localStorage.getItem('dreamerz_beta_theme_v1');
                    if (t === 'dark') {
                        document.documentElement.classList.add('dark');
                    }
                } catch (e) {
                    /* localStorage may be blocked in some private-browsing modes */
                }
            })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
